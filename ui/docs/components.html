<cxl-t h3>Components</cxl-t>
<p></p>
<style>
	.components-card {
		transition: box-shadow var(--cxl-speed);
	}
	.components-card:hover {
		box-shadow: 2px 2px 6px var(--cxl-elevation);
	}
</style>
<cxl-input-chips id="input-chips"> </cxl-input-chips>

<cxl-grid id="grid"> </cxl-grid>

<script>
	(() => {
		const inputChips = document.getElementById('input-chips');
		const grid = document.getElementById('grid');
		const ComponentKind = 35;
		const ENTITIES_REGEX = /[&<]/g;
		const ENTITIES_MAP = {
			'&': '&amp;',
			'<': '&lt;',
		};

		function sortByName(a, b) {
			return a.name > b.name ? 1 : -1;
		}

		function getSummary(docs) {
			return docs.content?.find(c => !c.tag)?.value || '';
		}

		function getDemo(docs) {
			return (
				docs.content?.find(c => c.tag === 'example' || c.tag === 'demo')
					?.value || ''
			);
		}

		function escape(str) {
			return str.replace(ENTITIES_REGEX, e => ENTITIES_MAP[e]);
		}

		function renderCard(node) {
			const tagName = node.docs.tagName;
			let summary = '';
			if (node.docs) {
				const doc = getSummary(node.docs);
				summary = doc ? doc.split('.')[0] : '';
			}
			const demo = getDemo(node.docs);

			return summary
				? `
		<cxl-c sm6 md4><cxl-a style="text-decoration:none" href="${node.href}">
		<cxl-card class="components-card" style="height: 100%">
		<iframe srcdoc="${escape(demo)}"></iframe>
		<cxl-c pad16>
			<div>
				<cxl-t subtitle>${node.name}</cxl-t>
				<cxl-t subtitle2>&lt;${tagName}&gt;</cxl-t>
			</div></cxl-c>
			<cxl-t body2>${summary}.</cxl-t>
		</cxl-c></cxl-card></cxl-a></cxl-c>
			`
				: '';
		}

		function parseJson(res) {
			let gridHtml = '';
			let chipsHtml = '';

			res.sort(sortByName).forEach(symbol => {
				if (
					symbol.kind === ComponentKind &&
					symbol.docs &&
					symbol.docs.tagName
				) {
					gridHtml += renderCard(symbol);
				}
			});

			grid.innerHTML = gridHtml;
		}

		const summary = fetch('summary.json')
			.then(res => res.json())
			.then(parseJson);
	})();
</script>
